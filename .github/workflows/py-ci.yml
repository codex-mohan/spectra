name: Python / PyO3 Build

on:
  push:
    branches: [main]
    paths:
      - 'crates/spectra-pyo3/**'
      - 'packages/core/**'
  pull_request:
    branches: [main]
    paths:
      - 'crates/spectra-pyo3/**'
      - 'packages/core/**'

jobs:
  build:
    name: Build PyO3 (${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        run: |
          cd crates/spectra-pyo3
          maturin build --release --target-dir ../target

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyo3-wheel-${{ matrix.os }}-py${{ matrix.python }}
          path: target/wheels/*.whl
          retention-days: 7

  test:
    name: Test PyO3
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install maturin
        run: pip install maturin

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio

      - name: Build and install in dev mode
        run: |
          cd crates/spectra-pyo3
          maturin develop --release

      - name: Run tests
        run: pytest --tb=short
        working-directory: crates/spectra-pyo3
