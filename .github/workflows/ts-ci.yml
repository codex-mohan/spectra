name: TypeScript / NAPI Build

on:
  push:
    branches: [main]
    paths:
      - 'packages/spectra-ts/**'
      - 'crates/spectra-napi/**'
      - 'packages/core/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/spectra-ts/**'
      - 'crates/spectra-napi/**'
      - 'packages/core/**'

jobs:
  build:
    name: Build NAPI (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: x86_64-unknown-linux-gnu
            artifact: spectra_napi.linux-x64-gnu.node
          - os: ubuntu-latest
            platform: aarch64-unknown-linux-gnu
            artifact: spectra_napi.linux-arm64-gnu.node
          - os: macos-latest
            platform: x86_64-apple-darwin
            artifact: spectra_napi.darwin-x64.node
          - os: macos-latest
            platform: aarch64-apple-darwin
            artifact: spectra_napi.darwin-arm64.node
          - os: windows-latest
            platform: x86_64-pc-windows-msvc
            artifact: spectra_napi.win32-x64-msvc.node

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build NAPI (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd crates/spectra-napi
          # Build for x86_64
          cargo build --release --target x86_64-unknown-linux-gnu
          # Build for ARM64
          cargo build --release --target aarch64-unknown-linux-gnu
        env:
          CARGO_AUDIT_EXCLUDE: ['RUSTSEC-0000']
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc

      - name: Build NAPI (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd crates/spectra-napi
          cargo build --release
          cargo build --release --target aarch64-apple-darwin
        env:
          CARGO_AUDIT_EXCLUDE: ['RUSTSEC-0000']

      - name: Build NAPI (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cargo build --release --package spectra-napi
        env:
          CARGO_AUDIT_EXCLUDE: ['RUSTSEC-0000']

      - name: Build TypeScript package
        run: |
          pnpm --filter @spectra/sdk build

  test:
    name: Test TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @spectra/sdk lint

      - name: Test
        run: pnpm --filter @spectra/sdk test
