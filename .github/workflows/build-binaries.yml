name: Build Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v0.4.9)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin-arm64
            ext: ''
          - os: ubuntu-latest
            platform: linux-x64
            ext: ''
          - os: windows-latest
            platform: windows-x64
            ext: '.exe'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
      PLATFORM: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: npx turbo run build --force

      - name: Build binary
        run: |
          cd packages/code
          mkdir -p binaries/${{ matrix.platform }}
          ENTRY="dist/src/cli.js"
          if [[ "${{ matrix.platform }}" == "windows-x64" ]]; then
            bun build --compile --target=bun-${{ matrix.platform }} "$ENTRY" --outfile binaries/${{ matrix.platform }}/spectra.exe
          else
            bun build --compile --target=bun-${{ matrix.platform }} "$ENTRY" --outfile binaries/${{ matrix.platform }}/spectra
          fi
        shell: bash

      - name: Copy native libraries
        run: |
          cd packages/code
          bash ../../scripts/copy-native-libs.sh ${{ matrix.platform }}
        shell: bash

      - name: Create archive (Linux)
        if: runner.os == 'Linux'
        run: |
          cd packages/code/binaries
          mv ${{ matrix.platform }} spectra && tar -czf spectra-${{ matrix.platform }}.tar.gz spectra && mv spectra ${{ matrix.platform }}
        shell: bash

      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          cd packages/code/binaries
          # Stage files for DMG volume
          mkdir -p dmg-staging
          cp ${{ matrix.platform }}/spectra dmg-staging/
          cp ${{ matrix.platform }}/libopentui.dylib dmg-staging/ 2>/dev/null || true
          cp -r ${{ matrix.platform }}/assets dmg-staging/ 2>/dev/null || true
          ln -s /usr/local/bin dmg-staging/bin
          # Create DMG
          hdiutil create -volname "Spectra" -srcfolder dmg-staging -ov -format UDZO spectra-${{ matrix.platform }}.dmg
          rm -rf dmg-staging
        shell: bash

      - name: Create MSI (Windows)
        if: runner.os == 'Windows'
        run: |
          cd packages/code/binaries

          # Generate WiX source file
          cat > spectra.wxs << 'WXS'
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://schemas.microsoft.com/wix/2006/wi">
            <Product Id="*" Name="Spectra" Language="1033" Version="0.5.1"
                     Manufacturer="codex-mohan" UpgradeCode="A7B9C2D4-E5F6-7890-ABCD-EF1234567890">
              <Package InstallerVersion="200" Compressed="yes" InstallScope="perUser" />
              <MajorUpgrade DowngradeErrorMessage="A newer version is already installed." />
              <MediaTemplate EmbedCab="yes" />
              <Feature Id="ProductFeature" Title="Spectra" Level="1">
                <ComponentGroupRef Id="ProductComponents" />
              </Feature>
            </Product>
            <Fragment>
              <Directory Id="TARGETDIR" Name="SourceDir">
                <Directory Id="LocalAppDataFolder">
                  <Directory Id="INSTALLFOLDER" Name="Spectra" />
                </Directory>
              </Directory>
            </Fragment>
            <Fragment>
              <ComponentGroup Id="ProductComponents" Directory="INSTALLFOLDER">
                <Component Id="MainExecutable" Guid="*">
                  <File Id="SpectraExe" Source="windows-x64\spectra.exe" KeyPath="yes" />
                </Component>
                <Component Id="NativeLib" Guid="*">
                  <File Id="OpenTuiDll" Source="windows-x64\opentui.dll" />
                </Component>
              </ComponentGroup>
            </Fragment>
          </Wix>
          WXS

          # Find WiX toolset
          WIX_DIR="C:\Program Files (x86)\WiX Toolset v3.11\bin"
          if [ ! -d "$WIX_DIR" ]; then
            WIX_DIR=$(find /c/Program\ Files* -name "candle.exe" -path "*/WiX*" 2>/dev/null | head -1 | xargs dirname 2>/dev/null || echo "")
          fi

          if [ -n "$WIX_DIR" ] && [ -d "$WIX_DIR" ]; then
            "$WIX_DIR/candle.exe" spectra.wxs -out spectra.wixobj
            "$WIX_DIR/light.exe" spectra.wixobj -out spectra-${{ matrix.platform }}.msi -ext WixUIExtension
          else
            echo "WiX not found, falling back to zip"
            powershell -Command "Compress-Archive -Path '${{ matrix.platform }}/*' -DestinationPath 'spectra-${{ matrix.platform }}.zip'"
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spectra-${{ matrix.platform }}
          path: |
            packages/code/binaries/spectra-${{ matrix.platform }}.tar.gz
            packages/code/binaries/spectra-${{ matrix.platform }}.dmg
            packages/code/binaries/spectra-${{ matrix.platform }}.msi
            packages/code/binaries/spectra-${{ matrix.platform }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd artifacts
          # Collect all archives
          FILES=""
          for dir in spectra-*/; do
            for f in "$dir"*.{tar.gz,zip,dmg,msi}; do
              [ -f "$f" ] && FILES="$FILES $f"
            done
          done

          # Upload to existing release or create new one
          gh release upload "$RELEASE_TAG" $FILES --clobber 2>/dev/null || \
          gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" $FILES
