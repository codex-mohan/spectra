name: Build Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v0.4.9)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin-arm64
            ext: ''
          - os: macos-13
            platform: darwin-x64
            ext: ''
          - os: ubuntu-latest
            platform: linux-x64
            ext: ''
          - os: ubuntu-latest
            platform: linux-arm64
            ext: ''
          - os: windows-latest
            platform: windows-x64
            ext: '.exe'
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
      PLATFORM: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: npx turbo run build --force

      - name: Build binary
        run: |
          cd packages/code
          mkdir -p binaries/${{ matrix.platform }}
          ENTRY="dist/src/cli.js"
          if [[ "${{ matrix.platform }}" == "windows-x64" ]]; then
            bun build --compile --target=bun-${{ matrix.platform }} "$ENTRY" --outfile binaries/${{ matrix.platform }}/spectra.exe
          else
            bun build --compile --target=bun-${{ matrix.platform }} "$ENTRY" --outfile binaries/${{ matrix.platform }}/spectra
          fi
        shell: bash

      - name: Copy native libraries
        run: |
          cd packages/code
          bash ../../scripts/copy-native-libs.sh ${{ matrix.platform }}
        shell: bash

      - name: Create archive
        run: |
          cd packages/code/binaries
          if [[ "${{ matrix.platform }}" == "windows-x64" ]]; then
            cd ${{ matrix.platform }} && zip -r ../spectra-${{ matrix.platform }}.zip . && cd ..
          else
            mv ${{ matrix.platform }} spectra && tar -czf spectra-${{ matrix.platform }}.tar.gz spectra && mv spectra ${{ matrix.platform }}
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spectra-${{ matrix.platform }}
          path: |
            packages/code/binaries/spectra-${{ matrix.platform }}.tar.gz
            packages/code/binaries/spectra-${{ matrix.platform }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd artifacts
          # Collect all archives
          FILES=""
          for dir in spectra-*/; do
            for f in "$dir"*.{tar.gz,zip}; do
              [ -f "$f" ] && FILES="$FILES $f"
            done
          done

          # Upload to existing release or create new one
          gh release upload "$RELEASE_TAG" $FILES --clobber 2>/dev/null || \
          gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" $FILES
