name: Release Builds

on:
  push:
    tags:
      - 'v*'

jobs:
  release-rust:
    name: Release Rust Crates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish crates
        run: |
          cargo login ${{ secrets.CARGO_REGISTRY_TOKEN }}
          cargo publish --package spectra-core
          cargo publish --package spectra-http
          cargo publish --package spectra-rs
        env:
          CARGO_AUDIT_EXCLUDE: ['RUSTSEC-0000']

  release-napi:
    name: Release NAPI (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    needs: release-rust
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: x86_64-unknown-linux-gnu
            artifact: spectra_napi.linux-x64-gnu.node
          - os: ubuntu-latest
            platform: aarch64-unknown-linux-gnu
            artifact: spectra_napi.linux-arm64-gnu.node
          - os: macos-latest
            platform: x86_64-apple-darwin
            artifact: spectra_napi.darwin-x64.node
          - os: macos-latest
            platform: aarch64-apple-darwin
            artifact: spectra_napi.darwin-arm64.node
          - os: windows-latest
            platform: x86_64-pc-windows-msvc
            artifact: spectra_napi.win32-x64-msvc.node

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Build NAPI (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo build --release --package spectra-napi --target x86_64-unknown-linux-gnu
          cargo build --release --package spectra-napi --target aarch64-unknown-linux-gnu
        env:
          CARGO_AUDIT_EXCLUDE: ['RUSTSEC-0000']
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc

      - name: Build NAPI (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cargo build --release --package spectra-napi
          cargo build --release --package spectra-napi --target aarch64-apple-darwin
        env:
          CARGO_AUDIT_EXCLUDE: ['RUSTSEC-0000']

      - name: Build NAPI (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo build --release --package spectra-napi
        env:
          CARGO_AUDIT_EXCLUDE: ['RUSTSEC-0000']

      - name: Package and publish
        run: node scripts/publish-napi.js ${{ needs.release-rust.outputs.version }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release-pyo3:
    name: Release PyO3
    runs-on: ubuntu-latest
    needs: release-rust
    strategy:
      fail-fast: false
      matrix:
        python: ['3.11', '3.12', '3.13']
        manylinux: [manylinux2014]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install maturin
        run: pip install maturin

      - name: Build manylinux wheel
        if: matrix.manylinux == 'manylinux2014'
        uses: PyO3/maturin-action@v1
        with:
          manylinux: ${{ matrix.manylinux }}
          args: --release -m crates/spectra-pyo3/Cargo.toml
          docker-push: false

      - name: Build native wheel
        if: matrix.manylinux != 'manylinux2014'
        run: |
          cd crates/spectra-pyo3
          maturin build --release

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyo3-wheel-${{ matrix.manylinux }}-py${{ matrix.python }}
          path: target/wheels/*.whl
          retention-days: 7

      - name: Publish to PyPI
        if: matrix.manylinux == 'manylinux2014' && matrix.python == '3.12'
        uses: PyPI/pypi@v2
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
