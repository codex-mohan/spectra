name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      - run: bun run build

      - name: Resolve workspace protocol dependencies for publishing
        run: bun run resolve-workspace-deps

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run release --no-git-tag
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.changesets.outputs.publishedPackages != '' && steps.changesets.outputs.publishedPackages != '[]'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          VERSION=$(echo "$PUBLISHED" | jq -r '.[0].version')
          TAG="v${VERSION}"

          # Build release body
          {
            echo "## Published Packages"
            echo ""
            for row in $(echo "$PUBLISHED" | jq -r '.[] | @base64'); do
              PKG_NAME=$(echo "$row" | base64 -d | jq -r '.name')
              VER=$(echo "$row" | base64 -d | jq -r '.version')
              echo "- \`\`${PKG_NAME}@${VER}\`\` — [npm](https://www.npmjs.com/package/${PKG_NAME}/v/${VER})"
            done
            echo ""
            echo "## Install"
            echo ""
            echo '```sh'
            echo "bun add @mohanscodex/spectra-ai@${VERSION}"
            echo '```'
          } > /tmp/release-body.md

          # Create and push unified tag, then create GitHub Release
          git tag "$TAG"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "$TAG"

          gh release create "$TAG" \
            --title "Spectra $TAG" \
            --notes-file /tmp/release-body.md \
            --latest