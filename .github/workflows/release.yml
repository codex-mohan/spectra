name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      - run: bun run build

      - name: Resolve workspace protocol dependencies for publishing
        run: bun run resolve-workspace-deps

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Query npm for the current published version instead of relying on
          # changesets' unreliable publishedPackages output
          VERSION=$(npm view @mohanscodex/spectra-ai version 2>/dev/null || echo "")
          if [ -z "$VERSION" ]; then
            echo "No version found on npm — nothing to release"
            exit 0
          fi

          TAG="v${VERSION}"

          # Skip if release already exists (idempotent)
          if gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
            echo "Release $TAG already exists — skipping"
            exit 0
          fi

          CHANGELOG=$(awk -v ver="## $VERSION" '$0 ~ ver {found=1; print; next} found && /^## / {exit} found' packages/ai/CHANGELOG.md)

          # Write release body
          cat > /tmp/release-body.md <<- EOF
          $CHANGELOG

          ## Published Packages

          - \`@mohanscodex/spectra-ai@${VERSION}\` — [npm](https://www.npmjs.com/package/@mohanscodex/spectra-ai/v/${VERSION})
          - \`@mohanscodex/spectra-agent@${VERSION}\` — [npm](https://www.npmjs.com/package/@mohanscodex/spectra-agent/v/${VERSION})
          - \`@mohanscodex/spectra-app@${VERSION}\` — [npm](https://www.npmjs.com/package/@mohanscodex/spectra-app/v/${VERSION})

          ## Install

          \`\`\`sh
          bun add @mohanscodex/spectra-ai@${VERSION} @mohanscodex/spectra-agent@${VERSION}
          bun add @mohanscodex/spectra-app@${VERSION}
          \`\`\`
          EOF

          # Create tag and release using gh CLI (handles auth automatically)
          git tag "$TAG"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$TAG"

          gh release create "$TAG" \
            --title "Spectra $TAG" \
            --notes-file /tmp/release-body.md \
            --latest