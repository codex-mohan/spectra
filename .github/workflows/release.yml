name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      - run: bun run build

      - name: Resolve workspace protocol dependencies for publishing
        run: bun run resolve-workspace-deps

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Delete per-package tags
        run: |
          for TAG in $(git tag -l "@mohanscodex/spectra-*"); do
            git push origin ":refs/tags/$TAG" || true
          done

      - name: Smoke test published packages
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "==> Waiting for npm registry propagation..."
          sleep 30

          # Get the published version from changesets output
          VERSION=$(echo '${{ steps.changesets.outputs.publishedPackages }}' | jq -r '.[0].version')
          echo "Published version: $VERSION"

          # Create isolated test directory
          WORKDIR=$(mktemp -d)
          cd "$WORKDIR"

          cat > package.json << 'EOF'
          {
            "name": "release-smoke-test",
            "private": true,
            "type": "module"
          }
          EOF

          echo "==> Installing published packages..."
          npm install \
            @mohanscodex/spectra-ai@$VERSION \
            @mohanscodex/spectra-agent@$VERSION \
            @mohanscodex/spectra-app@$VERSION

          echo "==> Verifying imports..."
          node --input-type=module -e "
            import { EventStream, stream } from '@mohanscodex/spectra-ai';
            import { Agent, defineTool } from '@mohanscodex/spectra-agent';
            import { SessionManager } from '@mohanscodex/spectra-app';
            import { z } from 'zod';

            // Verify each package loads
            new EventStream();
            console.log('  @mohanscodex/spectra-ai: OK');

            const tool = defineTool({
              name: 'test', description: 'test',
              parameters: z.object({ x: z.string() }),
              execute: async ({ x }) => ({ content: [{ type: 'text', text: x }] }),
            });
            console.log('  @mohanscodex/spectra-agent: OK');

            new SessionManager({ model: 'anthropic/claude-3-haiku-20240307' });
            console.log('  @mohanscodex/spectra-app: OK');

            console.log('==> All smoke tests passed.');
          "

          rm -rf "$WORKDIR"
